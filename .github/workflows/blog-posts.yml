name: Update README with RSS
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch RSS and Update
        uses: sarisia/actions-readme-feed@v1
        with:
          url: "https://www.broslunas.com/rss.xml"
          file: "README.md"
          # Aquí definimos las marcas de otra forma si la anterior fallaba
          start_flag: ""
          end_flag: ""
          # Formato de salida limpio
          format: "- [${title}](${url})"
          max_posts: 5

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualizado con los últimos posts del blog"